model = "gpt-5.4"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
model_provider = "cliproxyapi"

[windows]
sandbox = "elevated"

[features]
multi_agent = true

[model_providers.cliproxyapi]
name = "CLIProxyAPI"
base_url = "http://127.0.0.1:8317/v1"
wire_api = "responses"
env_key = "CLIPROXYAPI_API_KEY"
env_key_instructions = "Stored locally in the user environment; rotate from C:\\Coding\\Tools\\limit-hub\\config\\.env if needed."
requires_openai_auth = false
supports_websockets = false

[agents]
max_threads = 20
max_depth = 1

